# glitch-CLT — Docker Compose Configuration
# ==========================================
# This file defines the llama.cpp TurboQuant server container.
# Customize via .env.local (copy from .env.example).

services:
  llamacpp:
    container_name: glitch-clt-server
    build:
      context: ./llama.cpp-turboquant
      dockerfile: .devops/cuda.Dockerfile
      target: full
      args:
        UBUNTU_VERSION: "24.04"
        CUDA_DOCKER_ARCH: "86"
    image: glitch-clt/llamacpp-turboquant:latest
    restart: unless-stopped

    # GPU passthrough — uses all available NVIDIA GPUs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Shared memory for multi-process inference
    shm_size: "8gb"
    ipc: host

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    # Server command with TurboQuant KV cache compression
    command:
      - -m
      - /models/${MODEL_FILE}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --alias
      - qwen3.6-35b-a3b-iq4xs
      - --ctx-size
      - "${CONTEXT_SIZE}"
      - --n-gpu-layers
      - "999"
      - --parallel
      - "1"
      - --threads
      - "8"
      - --flash-attn
      - on
      - --batch-size
      - "256"
      - --ubatch-size
      - "256"
      - --cache-type-k
      - turbo4
      - --cache-type-v
      - turbo4
      - --temp
      - "0.6"
      - --top-p
      - "0.95"
      - --top-k
      - "20"
      - --min-p
      - "0.0"
      - --presence-penalty
      - "0.0"
      - --repeat-penalty
      - "1.1"
      - --repeat-last-n
      - "128"

    # Mount model files (read-only for safety)
    volumes:
      - ./models:/models:ro

    # Expose the OpenAI-compatible API endpoint
    ports:
      - "${LLAMACPP_PORT}:8000"

    # Health check — verifies server is responding
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

